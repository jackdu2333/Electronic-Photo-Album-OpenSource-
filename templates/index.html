<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>数字相框 - Digital Photo Frame</title>
    <script>
        (function () {
            const savedStyle = localStorage.getItem('photoFrameHomeStyle') || 'style-2';
            document.documentElement.setAttribute('data-home-style', savedStyle);
        })();
    </script>
    <!-- Config from backend -->
    <script>
        window.BABY_CONFIG = {
            name: '{{ baby_name | default("", true) }}',
            birthday: '{{ baby_birthday | default("", true) }}'
        };
    </script>
    <!-- Google Font 'Inter' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Global Styles --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.05), transparent 22%),
                radial-gradient(circle at 82% 16%, rgba(66, 94, 145, 0.10), transparent 26%),
                #030405;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            /* Flex container for split layout */
        }

        .info-panel,
        .photo-panel,
        #slideshow-container,
        #controls,
        .weather-widget,
        .slide-date,
        #chat-container,
        .message-bubble {
            transition: all 0.45s ease;
        }

        /* --- Layout --- */
        .info-panel {
            width: 35%;
            height: 100%;
            padding: 0;
            padding-left: 60px;
            padding-top: 15vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 15px;
            /* Reduced gap to save space */
            position: relative;
            /* Ensure absolute children position relative to this */
            background:
                linear-gradient(180deg, rgba(4, 5, 8, 0.96), rgba(4, 5, 8, 0.78) 58%, rgba(4, 5, 8, 0.58));
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.04);
        }

        .info-top {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .info-bottom {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 0;
            flex: 1;
            justify-content: flex-end;
            margin-top: 28px;
            position: relative;
        }

        .photo-panel {
            width: 65%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- Info Components (iOS Style) --- */

        .greeting {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: -10px;
        }

        .time {
            font-size: 116px;
            font-weight: 300;
            color: #fff;
            line-height: 0.94;
            letter-spacing: -4px;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
        }

        .date {
            font-size: 24px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.74);
            letter-spacing: 0.04em;
            margin-top: 8px;
            white-space: nowrap;
        }

        #weather-widget {
            display: flex;
            align-items: center;
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            /* Reduced margin */
            padding: 16px 18px;
            padding-left: 20px;
            border-left: 4px solid #55b6ff;
            background: rgba(255, 255, 255, 0.045);
            border-radius: 0 18px 18px 0;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
        }

        .weather-icon {
            font-size: 40px;
            line-height: 1;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .weather-temp {
            font-size: 32px;
            font-weight: 600;
            line-height: 1.1;
        }

        .weather-desc {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 400;
        }

        /* --- Chat Interface --- */
        #chat-container {
            flex: 1;
            min-height: 120px;
            max-height: 240px;
            /* Limit height roughly to 3 messages */
            width: 100%;
            margin-top: 0;
            margin-bottom: 64px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            /* IE/Edge */
            -webkit-overflow-scrolling: touch;
            /* Smooth scrolling on iOS */
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            padding-right: 12px;
            overscroll-behavior: contain;
            /* Fade out the top a bit */
            mask-image: linear-gradient(to bottom, transparent, black 20%);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%);
        }

        #chat-container::-webkit-scrollbar {
            display: none;
        }

        #chat-messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 10px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .sender-name {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2px;
            margin-left: 10px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            position: relative;
            backdrop-filter: blur(12px);
        }

        /* My Message (Right) */
        .my-message {
            align-self: flex-end;
            align-items: flex-end;
            /* For name alignment if we showed it */
        }

        .my-message .message-bubble {
            background-color: rgba(10, 132, 255, 0.82);
            /* iOS Blue */
            color: white;
            border-bottom-right-radius: 12px;
            box-shadow: 0 12px 28px rgba(10, 132, 255, 0.16);
        }

        /* Their Message (Left) */
        .their-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .their-message .message-bubble {
            background-color: rgba(255, 255, 255, 0.16);
            /* iOS Gray */
            color: white;
            border-bottom-left-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        #chat-input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Fixed: relative to info-panel now */
            padding: 15px 20px 15px 60px;
            /* Match info-panel padding */
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            /* background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); Optional bg gradient */
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #chat-input-area:hover,
        #chat-input-area:focus-within {
            opacity: 1;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.18);
            /* Slightly lighter */
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 20px;
            padding: 12px 15px;
            /* Taller input */
            color: white;
            outline: none;
            font-size: 16px;
            backdrop-filter: blur(5px);
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #chat-send-btn {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 24px;
            cursor: pointer;
            padding: 0 5px;
            display: flex;
            align-items: center;
        }

        #chat-send-btn:active {
            transform: scale(0.9);
        }

        @media (max-width: 768px) {
            #chat-input-area {
                width: 100%;
                padding-left: 40px;
                padding-right: 20px;
            }
        }

        #slideshow-container {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow:
                0 24px 90px rgba(0, 0, 0, 0.34),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .slide-group {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .slide-group.active {
            opacity: 1;
        }

        .slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(60%) saturate(0.92);
            z-index: 1;
        }

        /* Added .slide fallback just in case old JS loads */
        .slide-fg,
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 24px 46px rgba(0, 0, 0, 0.34));
        }

        .slide-date {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.96);
            font-size: 18px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(8, 12, 18, 0.52);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: 'Inter', sans-serif;
            text-align: right;
            line-height: 1.4;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
            pointer-events: none;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.18);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            font-size: 1.2rem;
        }

        /* --- Navigation Controls --- */
        #controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-panel:hover #controls {
            opacity: 1;
        }

        #controls button {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.24);
            color: white;
            font-size: 24px;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
        }

        #controls button:hover {
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            transform: scale(1.1);
        }

        /* --- Hidden Home Style Switcher --- */
        #home-style-hotspot {
            position: fixed;
            top: 0;
            left: 0;
            width: 90px;
            height: 90px;
            z-index: 420;
            background: transparent;
        }

        #home-style-switcher {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 430;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px;
            width: 220px;
            border-radius: 18px;
            background: rgba(10, 14, 20, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.30);
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        #home-style-switcher.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .style-switcher-title {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2px;
        }

        .style-switcher-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.5;
            margin-bottom: 4px;
        }

        .style-option {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.88);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .style-option:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: none;
        }

        .style-option.active {
            background: rgba(10, 132, 255, 0.30);
            border-color: rgba(10, 132, 255, 0.48);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .style-option span {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.62);
            text-align: left;
            line-height: 1.4;
        }

        .style-option.active span {
            color: rgba(255, 255, 255, 0.86);
        }

        /* --- Home Style 2: Immersive --- */
        html[data-home-style="style-2"] body {
            background:
                radial-gradient(circle at top right, rgba(82, 119, 186, 0.24), transparent 30%),
                radial-gradient(circle at bottom left, rgba(255, 189, 120, 0.12), transparent 28%),
                #06080c;
        }

        html[data-home-style="style-2"] .photo-panel {
            width: 100%;
            padding: 18px;
        }

        html[data-home-style="style-2"] .info-panel {
            position: fixed;
            left: 24px;
            top: 24px;
            bottom: auto;
            height: calc(100vh - 48px);
            width: 380px;
            z-index: 120;
            padding: 30px;
            border-radius: 32px;
            background:
                linear-gradient(180deg, rgba(10, 13, 20, 0.88), rgba(10, 13, 20, 0.48)),
                radial-gradient(circle at top right, rgba(121, 154, 214, 0.16), transparent 36%);
            backdrop-filter: blur(18px);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.40);
            border: 1px solid rgba(255, 255, 255, 0.10);
            justify-content: flex-start;
            overflow: hidden;
            box-sizing: border-box;
        }

        html[data-home-style="style-2"] .greeting {
            font-size: 18px;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.78);
        }

        html[data-home-style="style-2"] .time {
            font-size: 96px;
            letter-spacing: -3px;
        }

        html[data-home-style="style-2"] .date {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.74);
        }

        html[data-home-style="style-2"] .weather-widget {
            margin-top: 14px;
            padding: 16px 18px;
            width: calc(100% - 36px);
            border-left: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.09);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        html[data-home-style="style-2"] #chat-container {
            height: auto;
            max-height: 190px;
            margin-top: 0;
            margin-bottom: 0;
            padding-right: 4px;
            mask-image: none;
            -webkit-mask-image: none;
        }

        html[data-home-style="style-2"] .message-row {
            max-width: 100%;
        }

        html[data-home-style="style-2"] .message-bubble {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.13);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        html[data-home-style="style-2"] .my-message .message-bubble {
            background: rgba(10, 132, 255, 0.72);
        }

        html[data-home-style="style-2"] #chat-input-area {
            position: static;
            width: 100%;
            padding: 0;
            opacity: 1;
            margin-top: 12px;
        }

        html[data-home-style="style-2"] #slideshow-container {
            border-radius: 34px;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 26%),
                linear-gradient(160deg, rgba(11, 14, 20, 0.96), rgba(4, 6, 10, 0.92));
            box-shadow:
                0 44px 120px rgba(0, 0, 0, 0.30),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        html[data-home-style="style-2"] .slide-bg {
            filter: blur(28px) brightness(48%) saturate(0.96);
            transform: scale(1.08);
        }

        html[data-home-style="style-2"] .slide {
            padding: 44px 38px 44px 112px;
            box-sizing: border-box;
            object-fit: contain;
            object-position: 60% center;
            filter: drop-shadow(0 32px 64px rgba(0, 0, 0, 0.36));
        }

        html[data-home-style="style-2"] .slide-date {
            top: 24px;
            right: 24px;
            background: rgba(9, 14, 22, 0.66);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        }

        html[data-home-style="style-2"] #controls {
            bottom: 24px;
            right: 24px;
            opacity: 1;
        }

        html[data-home-style="style-2"] #controls button {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(12px);
        }

        html[data-home-style="style-2"] #controls button:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* --- Home Style 3: Gallery --- */
        html[data-home-style="style-3"] body {
            background:
                linear-gradient(180deg, #f0ece5 0%, #e7e0d4 44%, #ddd3c4 100%);
            color: #161616;
        }

        html[data-home-style="style-3"] .info-panel {
            width: 28%;
            min-width: 320px;
            padding-left: 42px;
            padding-top: 9vh;
            color: #161616;
            background:
                linear-gradient(180deg, rgba(245, 239, 229, 0.88), rgba(235, 226, 211, 0.60));
            box-shadow: inset -1px 0 0 rgba(58, 47, 37, 0.06);
        }

        html[data-home-style="style-3"] .greeting,
        html[data-home-style="style-3"] .date,
        html[data-home-style="style-3"] .weather-desc,
        html[data-home-style="style-3"] .sender-name {
            color: rgba(22, 22, 22, 0.58);
        }

        html[data-home-style="style-3"] .time,
        html[data-home-style="style-3"] .weather-temp {
            color: #161616;
        }

        html[data-home-style="style-3"] .photo-panel {
            width: 72%;
            padding: 42px 42px 42px 10px;
        }

        html[data-home-style="style-3"] #slideshow-container {
            border-radius: 38px;
            background: #f8f3ea;
            box-shadow:
                0 34px 90px rgba(63, 47, 26, 0.14),
                inset 0 0 0 1px rgba(48, 36, 20, 0.06);
        }

        html[data-home-style="style-3"] .slide-bg {
            filter: blur(30px) brightness(98%) saturate(0.72);
            opacity: 0.82;
            transform: scale(1.05);
        }

        html[data-home-style="style-3"] .slide {
            padding: 46px;
            box-sizing: border-box;
            object-fit: contain;
            object-position: center center;
            filter: drop-shadow(0 22px 46px rgba(43, 31, 12, 0.18));
        }

        html[data-home-style="style-3"] .slide-date {
            top: auto;
            bottom: 28px;
            right: 28px;
            color: rgba(20, 15, 10, 0.92);
            background: rgba(255, 249, 241, 0.84);
            text-shadow: none;
            border-radius: 16px;
            border: 1px solid rgba(58, 47, 37, 0.10);
        }

        html[data-home-style="style-3"] .weather-widget {
            border-left-color: #88643d;
        }

        html[data-home-style="style-3"] .their-message .message-bubble {
            background-color: rgba(36, 27, 16, 0.08);
            color: #161616;
        }

        html[data-home-style="style-3"] .my-message .message-bubble {
            background-color: rgba(138, 100, 61, 0.92);
            color: #fff;
        }

        html[data-home-style="style-3"] #chat-input {
            background: rgba(255, 255, 255, 0.72);
            color: #161616;
            border-color: rgba(22, 22, 22, 0.12);
        }

        html[data-home-style="style-3"] #chat-input::placeholder {
            color: rgba(22, 22, 22, 0.42);
        }

        html[data-home-style="style-3"] #controls button {
            background: rgba(255, 249, 241, 0.64);
            color: #3a2f25;
            border-color: rgba(58, 47, 37, 0.14);
        }

        html[data-home-style="style-3"] #controls button:hover {
            background: rgba(255, 249, 241, 0.92);
            color: #161616;
        }

        /* --- V2.2 Mobile: Portrait Mode --- */
        /* Photo TOP, Info BOTTOM */
        @media screen and (max-width: 1024px) and (orientation: portrait) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                background:
                    radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 24%),
                    #050608;
            }

            .photo-panel {
                width: 100%;
                height: 52vh;
                min-height: 280px;
                max-height: 58vh;
                padding: 12px 12px 6px;
                order: 1;
                /* TOP */
            }

            .info-panel {
                width: 100%;
                height: auto;
                min-height: calc(48vh - 18px);
                padding: 18px 20px 84px;
                order: 2;
                /* BOTTOM */
                justify-content: flex-start;
                gap: 18px;
                background:
                    linear-gradient(180deg, rgba(7, 9, 14, 0.96), rgba(7, 9, 14, 0.86));
                box-shadow: none;
            }

            .time {
                font-size: 68px;
                letter-spacing: -2px;
            }

            .greeting {
                font-size: 16px;
            }

            .date {
                font-size: 15px;
                white-space: normal;
            }

            #chat-container {
                min-height: 96px;
                height: 120px;
                max-height: 140px;
                margin-bottom: 56px;
                padding-right: 6px;
            }

            #controls {
                opacity: 1;
                bottom: 12px;

    <!-- V2.2 Admin Toggle JS -->
    <script>
        (function () {
            const toggleBtn = document.getElementById('admin-toggle-btn');
            const adminEntry = document.getElementById('mobile-admin-entry');
            if (!toggleBtn || !adminEntry) return;
            toggleBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                const isOpen = adminEntry.classList.toggle('visible');
                toggleBtn.classList.toggle('open', isOpen);
            });
            // Click anywhere else to close
            document.addEventListener('click', function () {
                adminEntry.classList.remove('visible');
                toggleBtn.classList.remove('open');
            });
        })();

        (function () {
            const hotspot = document.getElementById('home-style-hotspot');
            const switcher = document.getElementById('home-style-switcher');
            const optionButtons = Array.from(document.querySelectorAll('.style-option'));
            const root = document.documentElement;
            let hideTimer = null;

            if (!hotspot || !switcher || optionButtons.length === 0) return;

            function currentStyle() {
                return root.getAttribute('data-home-style') || 'style-1';
            }

            function syncActiveState() {
                const activeStyle = currentStyle();
                optionButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.style === activeStyle);
                });
            }

            function showSwitcher() {
                clearTimeout(hideTimer);
                switcher.classList.add('visible');
            }

            function hideSwitcher(delay = 220) {
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    switcher.classList.remove('visible');
                }, delay);
            }

            function applyStyle(style) {
                root.setAttribute('data-home-style', style);
                localStorage.setItem('photoFrameHomeStyle', style);
                syncActiveState();
            }

            syncActiveState();

            hotspot.addEventListener('mouseenter', showSwitcher);
            switcher.addEventListener('mouseenter', showSwitcher);
            hotspot.addEventListener('mouseleave', () => hideSwitcher());
            switcher.addEventListener('mouseleave', () => hideSwitcher());

            hotspot.addEventListener('click', function (e) {
                e.stopPropagation();
                switcher.classList.toggle('visible');
            });

            optionButtons.forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    applyStyle(btn.dataset.style);
                    hideSwitcher(120);
                });
            });

            document.addEventListener('click', function (e) {
                if (!switcher.contains(e.target) && !hotspot.contains(e.target)) {
                    switcher.classList.remove('visible');
                }
            });
        })();
    </script>

    <!-- V1.3 Info Logic -->
    <script>
        /* --- Greeting --- */
        function updateGreeting() {
            const hour = new Date().getHours();
            let timeGreeting = "";
            if (hour >= 5 && hour < 11) {
                timeGreeting = "早上好";
            } else if (hour >= 11 && hour < 13) {
                timeGreeting = "中午好";
            } else if (hour >= 13 && hour < 18) {
                timeGreeting = "下午好";
            } else if (hour >= 18 && hour < 23) {
                timeGreeting = "晚上好";
            } else {
                timeGreeting = "夜深了"; // 23:00 - 05:00
            }

            // 使用当前登录用户的用户名
            let name = CURRENT_USER || "访客";
            // 如果是邮箱或完整用户名，只取第一部分
            if (name.includes('@')) {
                name = name.split('@')[0];
            }

            // 特殊问候语：夜深了
            if (hour >= 23 || hour < 5) {
                document.getElementById('greeting').textContent = `${timeGreeting}，${name}`;
            } else {
                document.getElementById('greeting').textContent = `${timeGreeting}，${name}`;
            }
        }

        /* --- Clock & Date --- */
        function updateClock() {
            const now = new Date();

            // Time: HH:MM
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock-time').textContent = `${hours}:${minutes}`;

            // Date: YYYY年MM月DD日 星期X
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];

            document.getElementById('clock-date').textContent = `${year}年${month}月${day}日 ${weekday}`;

            // Update greeting every minute as well
            updateGreeting();
        }

        setInterval(updateClock, 1000); // Update every second
        updateClock(); // Initial call

        /* --- Weather (Open-Meteo) --- */
        // Coordinates from backend API
        const WEATHER_API = '/api/weather-config';

        // WMO Weather interpretation
        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if (code === 1 || code === 2 || code === 3) return '⛅';
            if (code >= 45 && code <= 48) return '🌫️';
            if (code >= 51 && code <= 55) return '🌧️';
            if (code >= 61 && code <= 67) return '🌧️';
            if (code >= 71 && code <= 77) return '❄️';
            if (code >= 80 && code <= 82) return '🌧️';
            if (code >= 95 && code <= 99) return '⛈️';
            return '☁️';
        }

        function getWeatherDesc(code) {
            const map = {
                0: '晴', 1: '多云', 2: '多云', 3: '阴',
                45: '雾', 48: '雾',
                51: '小雨', 53: '中雨', 55: '大雨',
                61: '小雨', 63: '中雨', 65: '大雨',
                71: '小雪', 73: '中雪', 75: '大雪',
                95: '雷雨', 96: '雷雨', 99: '雷雨'
            };
            return map[code] || '未知'; // simplified
        }

        async function fetchWeather() {
            try {
                const response = await fetch(WEATHER_API);
                const data = await response.json();

                if (data.enabled && data.current) {
                    const temp = Math.round(data.current.temperature_2m);
                    const code = data.current.weather_code;

                    document.getElementById('weather-temp').textContent = `${temp}°C`;
                    document.getElementById('weather-icon').textContent = getWeatherIcon(code);
                    document.getElementById('weather-desc').textContent = getWeatherDesc(code);
                } else if (!data.enabled) {
                    // Weather disabled in config
                    document.getElementById('weather-widget').style.display = 'none';
                } else {
                    document.getElementById('weather-desc').textContent = '天气离线';
                }
            } catch (error) {
                console.error('Error fetching weather:', error);
                document.getElementById('weather-desc').textContent = '天气离线';
            }
        }

        // Fetch weather every 30 minutes
        setInterval(fetchWeather, 30 * 60 * 1000);
        fetchWeather(); // Initial call

    </script>
