name: Build TV APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 直接空投安装稳定的 8.4 版本引擎
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 抛弃原来那个可能有问题的内部工具，直接用新引擎编译
    - name: Build APK
      working-directory: ./android_project
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OneTwo-TV-Frame-APK
        path: android_project/app/build/outputs/apk/debug/app-debug.apk
