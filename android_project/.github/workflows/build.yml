name: Build TV APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Wrapper & Build APK
      working-directory: ./android_project
      run: |
        gradle wrapper
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OneTwo-TV-Frame-APK
        path: android_project/app/build/outputs/apk/debug/app-debug.apk
